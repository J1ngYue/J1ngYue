name: Generate GitHub Snake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate snake images
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: J1ngYue
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Copy images to repository root
        run: |
          mkdir -p dist
          cp dist/github-snake.svg github-snake.svg
          cp dist/github-snake-dark.svg github-snake-dark.svg

      - name: Commit and push generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg dist
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate snake animation"
            git push
          fi
